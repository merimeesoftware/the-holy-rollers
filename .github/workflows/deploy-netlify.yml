# Deploy to Netlify via CLI
# Template: placed into generated site repos by deploy_node.py
# Requires secrets: NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID

name: Deploy to Netlify

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    outputs:
      deploy-url: ${{ steps.deploy.outputs.deploy-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Netlify
        id: deploy
        run: |
          output=$(npx netlify-cli deploy --prod --dir=dist --message "Deploy from ${{ github.sha }}")
          url=$(echo "$output" | grep -oP 'Website URL:\s*\K\S+' || echo "")
          echo "deploy-url=$url" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  comment:
    name: Post deploy URL on PR
    runs-on: ubuntu-latest
    needs: build-deploy
    if: github.event_name == 'push' && github.event.head_commit.message && contains(github.event.head_commit.message, 'Merge pull request')
    steps:
      - name: Find merged PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const match = context.payload.head_commit.message.match(/Merge pull request #(\d+)/);
            if (match) return match[1];
            return '';
          result-encoding: string

      - name: Comment on PR
        if: steps.pr.outputs.result != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ needs.build-deploy.outputs.deploy-url }}' || 'Check Netlify dashboard';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.pr.outputs.result }}'),
              body: `🚀 **Deployed to Netlify.**\n\n**URL:** ${url}`
            });
